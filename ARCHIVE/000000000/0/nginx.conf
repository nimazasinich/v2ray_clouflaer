# ============================================================
# DreamMaker — Nginx Configuration (FIXED v2.1)
#
# CRITICAL FIX vs document version:
#  ✅ Removed `if ($http_upgrade != "websocket") { return 404; }`
#     from ALL location blocks.
#     That guard BREAKS XHTTP transport because XHTTP sends
#     regular HTTP POST/GET requests — no Upgrade header.
#     Xray XHTTP mode="auto" handles both WebSocket and XHTTP
#     internally. Nginx just needs to proxy_pass transparently.
#
#  ✅ Added `map $http_upgrade $connection_upgrade` to correctly
#     set Connection header for WebSocket (upgrade) vs XHTTP (close)
#
#  ✅ Added `proxy_buffering off` and `proxy_request_buffering off`
#     for XHTTP streaming (chunked transfer support)
#
#  ✅ Added `server_tokens off`
#
# Deploy: /etc/nginx/nginx.conf
# Reload:  sudo nginx -t && sudo systemctl reload nginx
# ============================================================

user www-data;
worker_processes auto;
pid /run/nginx.pid;

events {
    worker_connections 4096;
    use epoll;
    multi_accept on;
}

http {
    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    types_hash_max_size 2048;
    server_tokens off;  # FIX: hide nginx version

    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    # ── Logging ─────────────────────────────────────────────
    # Retain only 7 days per privacy policy (Section 37)
    access_log /var/log/nginx/access.log;
    error_log  /var/log/nginx/error.log warn;

    # ── TLS session cache (shared across workers) ────────────
    ssl_session_cache    shared:SSL:50m;
    ssl_session_timeout  1d;
    ssl_session_tickets  off;

    # ── OCSP stapling ────────────────────────────────────────
    ssl_stapling         on;
    ssl_stapling_verify  on;
    resolver             1.1.1.1 1.0.0.1 valid=300s;
    resolver_timeout     5s;

    # ── CRITICAL FIX: WebSocket + XHTTP Connection header ────
    # WebSocket needs "upgrade"; XHTTP needs "close" (or blank).
    # This map replaces the broken `if ($http_upgrade != "websocket")`
    # guard that was rejecting all XHTTP connections.
    map $http_upgrade $connection_upgrade {
        default upgrade;
        ''      close;
    }

    # ── Cloudflare Real IP restoration ───────────────────────
    # Must appear in http{} block (or per-server with set_real_ip_from)
    set_real_ip_from 103.21.244.0/22;
    set_real_ip_from 103.22.200.0/22;
    set_real_ip_from 103.31.4.0/22;
    set_real_ip_from 104.16.0.0/12;
    set_real_ip_from 108.162.192.0/18;
    set_real_ip_from 131.0.72.0/22;
    set_real_ip_from 141.101.64.0/18;
    set_real_ip_from 162.158.0.0/15;
    set_real_ip_from 172.64.0.0/13;
    set_real_ip_from 173.245.48.0/20;
    set_real_ip_from 188.114.96.0/20;
    set_real_ip_from 190.93.240.0/20;
    set_real_ip_from 197.234.240.0/22;
    set_real_ip_from 198.41.128.0/17;
    set_real_ip_from 2400:cb00::/32;
    set_real_ip_from 2606:4700::/32;
    set_real_ip_from 2803:f800::/32;
    set_real_ip_from 2405:b500::/32;
    set_real_ip_from 2405:8100::/32;
    set_real_ip_from 2a06:98c0::/29;
    set_real_ip_from 2c0f:f248::/32;
    real_ip_header CF-Connecting-IP;

    # ────────────────────────────────────────────────────────
    # HTTP → HTTPS redirect
    # ────────────────────────────────────────────────────────
    server {
        listen 80 default_server;
        listen [::]:80 default_server;
        server_name _;
        return 301 https://$host$request_uri;
    }

    # ────────────────────────────────────────────────────────
    # Main TLS server — all traffic enters here
    # ────────────────────────────────────────────────────────
    server {
        listen 443 ssl;
        listen [::]:443 ssl;
        http2 on;
        server_name dreammaker-groupsoft.ir
                    cdn.dreammaker-groupsoft.ir
                    clean.dreammaker-groupsoft.ir;

        # ── TLS certificate (Let's Encrypt) ─────────────────
        ssl_certificate     /etc/letsencrypt/live/dreammaker-groupsoft.ir/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/dreammaker-groupsoft.ir/privkey.pem;

        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_prefer_server_ciphers off;
        ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305;

        # ── Security headers ─────────────────────────────────
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
        add_header X-Content-Type-Options    "nosniff"                             always;
        add_header X-Frame-Options           "DENY"                                always;
        add_header X-XSS-Protection          "1; mode=block"                       always;
        add_header Referrer-Policy           "no-referrer"                         always;
        add_header Permissions-Policy        "geolocation=(), microphone=(), camera=()" always;

        # ── Default: reject everything not explicitly routed ─
        location / {
            return 444;
        }

        # ────────────────────────────────────────────────────
        # Xray inbound proxies — one location per tier
        #
        # XHTTP + WebSocket use the SAME path.
        # Xray mode="auto" distinguishes them internally.
        # DO NOT add `if ($http_upgrade != "websocket")` here.
        #
        # proxy_buffering off      → required for XHTTP chunked streaming
        # proxy_request_buffering off → required for XHTTP upload streaming
        # $connection_upgrade      → set by map directive above
        # ────────────────────────────────────────────────────

        # ── TIER 1: Starter (1GB) — port 11001 ──────────────
        location /api/v1/ping {
            proxy_pass               http://127.0.0.1:11001;
            proxy_http_version       1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection $connection_upgrade;
            proxy_set_header Host    $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_read_timeout       300s;
            proxy_connect_timeout    5s;
            proxy_send_timeout       300s;
            proxy_buffering          off;
            proxy_request_buffering  off;
        }

        # ── TIER 2: Basic (2GB) — port 11002 ────────────────
        location /cdn/init {
            proxy_pass               http://127.0.0.1:11002;
            proxy_http_version       1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection $connection_upgrade;
            proxy_set_header Host    $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_read_timeout       300s;
            proxy_connect_timeout    5s;
            proxy_send_timeout       300s;
            proxy_buffering          off;
            proxy_request_buffering  off;
        }

        # ── TIER 3: Standard (5GB) — port 11003 ─────────────
        location /app/sync {
            proxy_pass               http://127.0.0.1:11003;
            proxy_http_version       1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection $connection_upgrade;
            proxy_set_header Host    $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_read_timeout       300s;
            proxy_connect_timeout    5s;
            proxy_send_timeout       300s;
            proxy_buffering          off;
            proxy_request_buffering  off;
        }

        # ── TIER 4: Plus (10GB) — port 11004 ────────────────
        location /api/v2/feed {
            proxy_pass               http://127.0.0.1:11004;
            proxy_http_version       1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection $connection_upgrade;
            proxy_set_header Host    $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_read_timeout       300s;
            proxy_connect_timeout    5s;
            proxy_send_timeout       300s;
            proxy_buffering          off;
            proxy_request_buffering  off;
        }

        # ── TIER 5: Pro (15GB) — port 11005 ─────────────────
        location /static/bundle.js {
            proxy_pass               http://127.0.0.1:11005;
            proxy_http_version       1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection $connection_upgrade;
            proxy_set_header Host    $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_read_timeout       300s;
            proxy_connect_timeout    5s;
            proxy_send_timeout       300s;
            proxy_buffering          off;
            proxy_request_buffering  off;
        }

        # ── TIER 6: Elite (20GB) — port 11006 ───────────────
        location /media/stream {
            proxy_pass               http://127.0.0.1:11006;
            proxy_http_version       1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection $connection_upgrade;
            proxy_set_header Host    $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_read_timeout       300s;
            proxy_connect_timeout    5s;
            proxy_send_timeout       300s;
            proxy_buffering          off;
            proxy_request_buffering  off;
        }

        # ── TIER 7: Unlimited — port 11007 ──────────────────
        location /v2/content/live {
            proxy_pass               http://127.0.0.1:11007;
            proxy_http_version       1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection $connection_upgrade;
            proxy_set_header Host    $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_read_timeout       300s;
            proxy_connect_timeout    5s;
            proxy_send_timeout       300s;
            proxy_buffering          off;
            proxy_request_buffering  off;
        }

        # ── Health check endpoint ────────────────────────────
        # Used by TIER 1 helper prober and monitoring tools.
        # Returns 200 with a minimal JSON body.
        location /health {
            default_type application/json;
            return 200 '{"ok":true,"service":"dreammaker","version":"2.1"}';
            add_header Cache-Control "no-store";
        }
    }
}
