##############################################################
# /etc/nginx/nginx.conf — Hardened Production Config
# Domain:      dreammaker-groupsoft.ir
# Architecture: Client -> Cloudflare:443 -> Nginx:443 -> Xray:127.0.0.1
# TLS:         Let's Encrypt (origin) + Cloudflare edge (Full Strict)
##############################################################

user www-data;
worker_processes auto;
pid /run/nginx.pid;
include /etc/nginx/modules-enabled/*.conf;

events {
    worker_connections 4096;
    use epoll;
    multi_accept on;
}

http {
    sendfile            on;
    tcp_nopush          on;
    tcp_nodelay         on;
    server_tokens       off;
    types_hash_max_size 2048;
    include  /etc/nginx/mime.types;
    default_type application/octet-stream;

    log_format main '$remote_addr - [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent"';
    access_log /var/log/nginx/access.log main;
    error_log  /var/log/nginx/error.log warn;

    proxy_connect_timeout  10s;
    proxy_read_timeout    310s;
    proxy_send_timeout    310s;
    keepalive_timeout      75s;
    send_timeout           30s;
    proxy_buffer_size         128k;
    proxy_buffers           4 256k;
    proxy_busy_buffers_size   256k;

    # Cloudflare real IP restoration
    # Source: https://www.cloudflare.com/ips-v4
    set_real_ip_from 103.21.244.0/22;
    set_real_ip_from 103.22.200.0/22;
    set_real_ip_from 103.31.4.0/22;
    set_real_ip_from 104.16.0.0/13;
    set_real_ip_from 104.24.0.0/14;
    set_real_ip_from 108.162.192.0/18;
    set_real_ip_from 131.0.72.0/22;
    set_real_ip_from 141.101.64.0/18;
    set_real_ip_from 162.158.0.0/15;
    set_real_ip_from 172.64.0.0/13;
    set_real_ip_from 173.245.48.0/20;
    set_real_ip_from 188.114.96.0/20;
    set_real_ip_from 190.93.240.0/20;
    set_real_ip_from 197.234.240.0/22;
    set_real_ip_from 198.41.128.0/17;
    real_ip_header    CF-Connecting-IP;
    real_ip_recursive on;

    limit_req_zone $binary_remote_addr zone=general:10m rate=30r/m;

    # HTTP -> HTTPS redirect
    server {
        listen 80 default_server;
        listen [::]:80 default_server;
        server_name _;
        return 301 https://$host$request_uri;
    }

    server {
        listen 443 ssl;
        http2  on;
        listen [::]:443 ssl;
        server_name dreammaker-groupsoft.ir;

        ssl_certificate     /etc/letsencrypt/live/dreammaker-groupsoft.ir/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/dreammaker-groupsoft.ir/privkey.pem;
        ssl_protocols       TLSv1.2 TLSv1.3;
        ssl_prefer_server_ciphers off;
        ssl_ciphers         ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305;
        ssl_session_cache   shared:SSL:50m;
        ssl_session_timeout 1d;
        ssl_session_tickets off;
        ssl_stapling        on;
        ssl_stapling_verify on;
        resolver 1.1.1.1 1.0.0.1 valid=300s;

        add_header X-Content-Type-Options  "nosniff"       always;
        add_header X-Frame-Options         "DENY"          always;
        add_header X-XSS-Protection        "1; mode=block" always;
        add_header Referrer-Policy         "no-referrer"   always;
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

        # VLESS WebSocket inbound
        # Xray: vless-ws listening on 127.0.0.1:10001
        location /68fbc8aa0e46ddb3 {
            if ($http_upgrade != "websocket") {
                return 404;
            }
            proxy_pass          http://127.0.0.1:10001;
            proxy_http_version  1.1;
            proxy_set_header    Upgrade           $http_upgrade;
            proxy_set_header    Connection        "upgrade";
            proxy_set_header    Host              $host;
            proxy_set_header    X-Real-IP         $remote_addr;
            proxy_set_header    X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header    X-Forwarded-Proto https;
            proxy_read_timeout  300s;
            proxy_send_timeout  300s;
        }

        # VLESS gRPC inbound
        # Xray: vless-grpc listening on 127.0.0.1:10002
        location /2812a98a0040abee {
            if ($content_type !~ "application/grpc") {
                return 404;
            }
            client_max_body_size 0;
            grpc_pass            grpc://127.0.0.1:10002;
            grpc_read_timeout    300s;
            grpc_send_timeout    300s;
            grpc_set_header      X-Real-IP       $remote_addr;
            grpc_set_header      X-Forwarded-For $proxy_add_x_forwarded_for;
            grpc_set_header      Host            $host;
        }

        # Block panel/admin paths
        location ~ ^/(admin|panel|xui|x-ui|login|dashboard|api) {
            return 444;
        }

        # Block dot-files
        location ~ /\. {
            return 444;
        }

        # Drop everything else silently
        location / {
            limit_req zone=general burst=5 nodelay;
            return 444;
        }
    }
}
